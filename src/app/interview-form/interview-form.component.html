<div class="page">
  <div class="card">

    <h2>Interview Scheduler</h2>

    <form (ngSubmit)="scheduleInterview(interviewForm)" #interviewForm="ngForm">

      <!-- ================= BASIC INFO ================= -->
      <div class="form-group-row">

        <div class="form-group">
          <label>Stage of Interview</label>
          <select [(ngModel)]="interview.stageOfInterview" name="stageOfInterview" required>
            <option value="">-- Select --</option>
            <option>First Round</option>
            <option>Second Round</option>
            <option>Final Round</option>
          </select>
        </div>

        <div class="form-group">
          <label>Recruiter Email</label>
          <input type="email" [(ngModel)]="interview.recruiterEmail" name="recruiterEmail" required>
        </div>

        <div class="form-group">
          <label>Candidate Email</label>
          <input type="email" [(ngModel)]="interview.candidateEmail" name="candidateEmail" required>
        </div>

        <div class="form-group">
          <label>Recruiter Name</label>
          <input type="text" [(ngModel)]="interview.recruiterName" name="recruiterName" required>
        </div>

        <div class="form-group">
          <label>Candidate Name</label>
          <input type="text" [(ngModel)]="interview.candidateName" name="candidateName" required>
        </div>

        <div class="form-group">
          <label>Interview Date</label>
          <input type="datetime-local" [(ngModel)]="interview.interviewDate" name="interviewDate" required>
        </div>

      </div>

      <!-- ================= INTERVIEW TYPE ================= -->
      <div class="form-group full-width">
        <label>Interview Type</label>
        <select [(ngModel)]="interview.interviewType" name="interviewType" (change)="onInterviewTypeChange()" required>
          <option value="">-- Select --</option>
          <option value="ONLINE MEET">ONLINE MEET</option>
          <option value="TELEPHONIC">TELEPHONIC</option>
          <option value="IN OFFICE">IN PERSON</option>
        </select>
      </div>

      <!-- ================= CONDITIONAL FIELDS ================= -->

      <div *ngIf="interview.interviewType === 'ONLINE MEET'" class="form-group full-width">
        <input placeholder="Google Meet Link" [(ngModel)]="interview.googleMeetLink" name="googleMeetLink">
      </div>

      <div *ngIf="interview.interviewType === 'TELEPHONIC'" class="form-group full-width">
        <input placeholder="Phone Number" [(ngModel)]="interview.phoneNumber" name="phoneNumber">
      </div>

      <div *ngIf="interview.interviewType === 'IN OFFICE'" class="form-group full-width">
        <textarea placeholder="Office Address" [(ngModel)]="interview.inOfficeDescription" name="inOfficeDescription"></textarea>
      </div>

      <!-- ================= DESCRIPTION ================= -->
      <div class="form-group full-width">
        <label>Description</label>
        <textarea [(ngModel)]="interview.description" name="description"></textarea>
      </div>

      <!-- ================= SUBMIT ================= -->
      <button type="submit" [disabled]="interviewForm.invalid">
        Schedule Interview
      </button>

    </form>

  </div>
</div>
